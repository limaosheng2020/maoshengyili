<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交成功 — 茂盛易理</title>

  <link rel="stylesheet" href="css/style.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .success-card {
      max-width: 480px;
      padding: 48px 36px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .success-icon {

    }
    .success-card h1 {
      font-size: 24px;

      margin-bottom: 12px;
    }
    .success-card p {
      color: #666;
      line-height: 1.8;
      margin-bottom: 8px;
    }
    .success-card .contact-row {
      background: #f8f5f0;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
    .success-card .contact-row .item {
      padding: 6px 0;
      font-size: 15px;
      color: #333;
    }
    .btn-back {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 28px;
      background: #8B0000;
      color: #fff;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
    }
    .btn-back:hover { opacity: 0.9; }

    </div>

    <a href="/" class="btn-back">返回首页</a>
  </div>

</body>
</html>
